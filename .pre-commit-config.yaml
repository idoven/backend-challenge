repos:
- repo: https://github.com/psf/black
  rev: 22.12.0
  hooks:
  - id: black
    args: ["--target-version=py310"]
    files: ecg/
- repo: https://github.com/pycqa/isort
  rev: 5.12.0
  hooks:
    - id: isort
      name: isort
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.1.1
  hooks:
  - id: mypy
    files: ecg/
    additional_dependencies:
    - "pydantic==1.10.2"
